# Activate with: --spring.profiles.active=prod
spring.datasource.url=jdbc:postgresql://ep-floral-wildflower-avufam11-pooler.c-11.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_gXw72nIFyLKB
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon Pooler specific optimizations
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Security (You can override this with an env var in production)
app.jwt.secret=${JWT_SECRET:a-long-random-secret-key-at-least-32-chars-long}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Disable H2 in production
spring.h2.console.enabled=false
