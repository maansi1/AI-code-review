spring.application.name=ai-code-review-assistant

# ---- Default profile: H2 in-memory, zero setup ----
spring.datasource.url=jdbc:h2:mem:codereview;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- File upload ----
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=uploads

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-in-production-min-32-bytes}
app.jwt.expiration-ms=86400000

# ---- Gemini ----
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.gemini.base-url=https://generativelanguage.googleapis.com

# ---- Groq (Added) ----
app.groq.api-key=${GROQ_API_KEY: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}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.groq.base-url=https://api.groq.com/openai/v1

# ---- CORS ----
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,https://ai-code-review-inky-nine.vercel.app}

server.port=${PORT:8080}
